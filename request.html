<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Appointment Request</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --verde: #0a5c3f;
      --verde-mid: #0f7a52;
      --verde-light: #e6f4ee;
      --text-dark: #1a1a1a;
      --text-muted: #666;
      --bg: #fafaf8;
      --white: #ffffff;
      --border: #e0e0d8;
      --radius: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      width: 100%;
      max-width: 680px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .badge {
      display: inline-block;
      background: var(--verde-light);
      color: var(--verde);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 1.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.7rem);
      color: var(--verde);
      margin-bottom: 0.8rem;
      font-weight: 500;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--verde-mid);
    }

    .submit-btn {
      width: 100%;
      background: var(--verde);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: var(--verde-mid);
      transform: translateY(-1px);
    }

    .footer-text {
      margin-top: 1.5rem;
      text-align: center;
      color: #888;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .form-container {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-18196510444"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'AW-18196510444');
</script>

<body>

  <div class="form-container">

    <span class="badge">
      Online Medical Care
    </span>

    <h1>Appointment Request</h1>

    <p class="subtitle">
      Fill out the information below to request your online medical appointment.
    </p>

    <form action="https://api.web3forms.com/submit" method="POST">
      <!--
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://heitorhcd.github.io/drheitor/confirmation.html">
      -->
      <input type="hidden" name="access_key" value="00ed21fa-054d-458f-930b-5c0d492afe69">
      <input type="hidden" name="redirect" value="https://heitorhcd.github.io/drheitor/confirmation.html">

      <div class="form-group">
        <label for="nome">Full Name</label>
        <input 
          type="text" 
          id="nome" 
          name="nome"
          placeholder="Enter your full name"
          required
        >
      </div>

       <div class="form-group">
        <label for="data">Date of Birth</label>
        <input 
          type="text" 
          id="data" 
          name="data" 
          maxlength="10" 
          placeholder="DD/MM/AAAA"
          inputmode="numeric"
        >
      </div>

      <div class="form-group">
        <label for="celular">Phone Number</label>
        <input 
          type="number" 
          id="celular" 
          name="celular"
          placeholder="+00 0000000000"
          required
        >
      </div>

      <div class="form-group">
        <label for="tipo">Type of Appointment</label>

        <select id="tipo" name="tipo" required>
          <option value="">Select an option</option>

          <option value="Consulta de Urgência">
            Emergency care
          </option>

          <option value="Renovação de Receita">
            Prescription Renewal
          </option>

          <option value="Solicitação de Exames e Encaminhamento">
            Test Requests and Referrals
          </option>
        </select>
      </div>

      <button type="submit" class="submit-btn">
        Request Appointment
      </button>

    </form>

    <div class="footer-text">
      Your information will only be used for contact and medical care purposes.
    </div>

  </div>

</body>
  <script>
document.getElementById('data').addEventListener('input', function(e) {
  let valor = e.target.value.replace(/\D/g, '');

  if (valor.length > 2) {
    valor = valor.slice(0,2) + '/' + valor.slice(2);
  }

  if (valor.length > 5) {
    valor = valor.slice(0,5) + '/' + valor.slice(5,9);
  }

  e.target.value = valor;
});

</script>
</html>
