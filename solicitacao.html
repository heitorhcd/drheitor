<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Solicitação de Atendimento</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --verde: #0a5c3f;
      --verde-mid: #0f7a52;
      --verde-light: #e6f4ee;
      --text-dark: #1a1a1a;
      --text-muted: #666;
      --bg: #fafaf8;
      --white: #ffffff;
      --border: #e0e0d8;
      --radius: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      width: 100%;
      max-width: 680px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .badge {
      display: inline-block;
      background: var(--verde-light);
      color: var(--verde);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 1.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.7rem);
      color: var(--verde);
      margin-bottom: 0.8rem;
      font-weight: 500;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--verde-mid);
    }

    .submit-btn {
      width: 100%;
      background: var(--verde);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: var(--verde-mid);
      transform: translateY(-1px);
    }

    .footer-text {
      margin-top: 1.5rem;
      text-align: center;
      color: #888;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .form-container {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

<body>

  <div class="form-container">
    <form action="https://formsubmit.co/drloganduarte@gmail.com" method="POST">
                    <div class="form-group"><input type="text" name="name" required placeholder="Full name"></div>
                     <div class="form-group"><input type="text" id="nascimento" name="nascimento" placeholder="Birth date"  pattern="\d{2}/\d{2}/\d{4}" required>  </div>
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="https://heitorhcd.github.io/drheitor/confirmation.html">
                    <button class="form-submit" type="submit">Send</button>
                </form>

    <span class="badge">
      Atendimento Médico Online
    </span>

    <h1>Solicitação de Atendimento</h1>

    <p class="subtitle">
      Preencha os dados abaixo para solicitar seu atendimento médico online.
    </p>

    <form action="https://formsubmit.co/drloganduarte@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://heitorhcd.github.io/drheitor/confirmation.html">

      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input 
          type="text" 
          id="nome" 
          name="nome"
          placeholder="Digite seu nome completo"
          required
        >
      </div>

      <div class="form-group">
        <label for="nascimento">Data de Nascimento</label>
        <input 
          type="text" 
          id="nascimento" 
          name="nascimento"
          placeholder="DD/MM/AAAA"
          pattern="\d{2}/\d{2}/\d{4}"
          required
        >
      </div>

      <div class="form-group">
        <label for="cpf">CPF</label>
        <input 
          type="number" 
          id="cpf" 
          name="cpf"
          placeholder="Digite apenas números"
          required
        >
      </div>

      <div class="form-group">
        <label for="celular">Celular</label>
        <input 
          type="number" 
          id="celular" 
          name="celular"
          placeholder="DDD + número"
          required
        >
      </div>

      <div class="form-group">
        <label for="tipo">Tipo de Atendimento</label>

        <select id="tipo" name="tipo" required>
          <option value="">Selecione uma opção</option>

          <option value="Consulta de Urgência">
            Consulta de Urgência
          </option>

          <option value="Renovação de Receita">
            Renovação de Receita
          </option>

          <option value="Solicitação de Exames e Encaminhamento">
            Solicitação de Exames e Encaminhamento
          </option>
        </select>
      </div>

      <button type="submit" class="submit-btn">
        Solicitar Atendimento
      </button>

    </form>

    <div class="footer-text">
      Seus dados serão utilizados apenas para contato e atendimento médico.
    </div>

  </div>

</body>
</html>
