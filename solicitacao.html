  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Solicitação de Atendimento</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --verde: #0a5c3f;
      --verde-mid: #0f7a52;
      --verde-light: #e6f4ee;
      --text-dark: #1a1a1a;
      --text-muted: #666;
      --bg: #fafaf8;
      --white: #ffffff;
      --border: #e0e0d8;
      --radius: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      width: 100%;
      max-width: 680px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .badge {
      display: inline-block;
      background: var(--verde-light);
      color: var(--verde);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 1.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.7rem);
      color: var(--verde);
      margin-bottom: 0.8rem;
      font-weight: 500;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--verde-mid);
    }

    .submit-btn {
      width: 100%;
      background: var(--verde);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 1rem;
    }

    .submit-btn:hover {
      background: var(--verde-mid);
      transform: translateY(-1px);
    }

    .footer-text {
      margin-top: 1.5rem;
      text-align: center;
      color: #888;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .form-container {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

<body>

  <div class="form-container">

    <span class="badge">
      Atendimento Médico Online
    </span>

    <h1>Solicitação de Atendimento</h1>

    <p class="subtitle">
      Preencha os dados abaixo para solicitar seu atendimento médico online.
    </p>

    <form action="https://api.web3forms.com/submit" method="POST">
      <!--
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://heitorhcd.github.io/drheitor/confirmation.html">
      -->
      <input type="hidden" name="access_key" value="00ed21fa-054d-458f-930b-5c0d492afe69">
      <input type="hidden" name="redirect" value="https://heitorhcd.github.io/drheitor/confirmacao.html">

      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input 
          type="text" 
          id="nome" 
          name="nome"
          placeholder="Digite seu nome completo"
          required
        >
      </div>

      <div class="form-group">
        <label for="data">Data de nascimento</label>
        <input 
          type="text" 
          id="data" 
          name="data" 
          maxlength="10" 
          placeholder="DD/MM/AAAA"
          inputmode="numeric"
        >
      </div>

      <!--
     <div class="form-group">
      <label for="cpf">CPF</label>
      <input 
        type="text"
        id="cpf"
        name="cpf"
        maxlength="14"
        inputmode="numeric"
      >
    </div>
      -->

    <div class="form-group">
      <label for="telefone">Celular</label>
      <input 
        type="text"
        id="telefone"
        name="telefone"
        maxlength="15"
        inputmode="numeric"
      >
    </div>

      <div class="form-group">
        <label for="tipo">Tipo de Atendimento</label>

        <select id="tipo" name="tipo" required>
          <option value="">Selecione uma opção</option>

          <option value="Consulta de Urgência">
            Consulta de Urgência
          </option>

          <option value="Renovação de Receita">
            Renovação de Receita
          </option>

          <option value="Solicitação de Exames e Encaminhamento">
            Solicitação de Exames e Encaminhamento
          </option>
        </select>
      </div>

      <button type="submit" class="submit-btn">
        Solicitar Atendimento
      </button>

    </form>

    <div class="footer-text">
      Seus dados serão utilizados apenas para contato e atendimento médico.
    </div>

  </div>

  <head></head>

  

</body>

  <script>
document.getElementById('data').addEventListener('input', function(e) {
  let valor = e.target.value.replace(/\D/g, '');

  if (valor.length > 2) {
    valor = valor.slice(0,2) + '/' + valor.slice(2);
  }

  if (valor.length > 5) {
    valor = valor.slice(0,5) + '/' + valor.slice(5,9);
  }

  e.target.value = valor;
});

    document.getElementById('cpf').addEventListener('input', function(e) {
  let valor = e.target.value.replace(/\D/g, '');
      
  if (valor.length > 3) {
    valor = valor.slice(0,3) + '.' + valor.slice(3);
  }

  if (valor.length > 7) {
    valor = valor.slice(0,7) + '.' + valor.slice(7);
  }

  if (valor.length > 11) {
    valor = valor.slice(0,11) + '-' + valor.slice(11,13);
  }

  e.target.value = valor;
});

    document.getElementById('telefone').addEventListener('input', function(e) {
  let valor = e.target.value.replace(/\D/g, '');

  if (valor.length > 0) {
    valor = '(' + valor;
  }

  if (valor.length > 3) {
    valor = valor.slice(0,3) + ')' + valor.slice(3);
  }

  if (valor.length > 8) {
    if (valor.replace(/\D/g, '').length === 10) {
      valor = valor.slice(0,8) + '-' + valor.slice(8);
    } else {
      valor = valor.slice(0,9) + '-' + valor.slice(9);
    }
  }

  e.target.value = valor;
});
</script>
</html>
